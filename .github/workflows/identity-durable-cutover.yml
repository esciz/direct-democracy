name: Identity Durable Cutover

on:
  workflow_dispatch:
    inputs:
      apply_migration:
        description: "Type true to apply identity migration after diagnostics and dry-run."
        required: true
        default: "false"
      run_prisma_deploy:
        description: "Type true to run prisma migrate deploy before identity migration."
        required: true
        default: "false"

concurrency:
  group: identity-durable-cutover
  cancel-in-progress: false

jobs:
  cutover:
    name: Durable identity cutover
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      actions: read
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      IDENTITY_MFA_ENCRYPTION_KEY: ${{ secrets.IDENTITY_MFA_ENCRYPTION_KEY }}
      IDENTITY_EVIDENCE_ENCRYPTION_KEY: ${{ secrets.IDENTITY_EVIDENCE_ENCRYPTION_KEY }}
      IDENTITY_EVIDENCE_STORAGE_BUCKET: ${{ vars.IDENTITY_EVIDENCE_STORAGE_BUCKET }}
      PLAYWRIGHT_SESSION_STORAGE_KEY: ${{ secrets.PLAYWRIGHT_SESSION_STORAGE_KEY }}
      PLAYWRIGHT_SESSION_STORAGE_BUCKET: ${{ vars.PLAYWRIGHT_SESSION_STORAGE_BUCKET }}
      DIRECT_DEMOCRACY_EMAIL_PROVIDER: ${{ secrets.DIRECT_DEMOCRACY_EMAIL_PROVIDER }}
      DIRECT_DEMOCRACY_EMAIL_FROM: ${{ secrets.DIRECT_DEMOCRACY_EMAIL_FROM }}
      DIRECT_DEMOCRACY_EMAIL_API_KEY: ${{ secrets.DIRECT_DEMOCRACY_EMAIL_API_KEY }}
      DIRECT_DEMOCRACY_EMAIL_TEST_RECIPIENT_ALLOWLIST: ${{ vars.DIRECT_DEMOCRACY_EMAIL_TEST_RECIPIENT_ALLOWLIST }}
      DIRECT_DEMOCRACY_WORKER_ENABLED: ${{ vars.DIRECT_DEMOCRACY_WORKER_ENABLED }}
      DIRECT_DEMOCRACY_NETWORK_ENABLED: ${{ vars.DIRECT_DEMOCRACY_NETWORK_ENABLED }}
      DIRECT_DEMOCRACY_DATABASE_BACKUP_CONFIGURED: ${{ vars.DIRECT_DEMOCRACY_DATABASE_BACKUP_CONFIGURED }}
      DIRECT_DEMOCRACY_DATABASE_RESTORE_TESTED: ${{ vars.DIRECT_DEMOCRACY_DATABASE_RESTORE_TESTED }}
      DIRECT_DEMOCRACY_RESTORE_TEST_DATABASE_URL: ${{ secrets.DIRECT_DEMOCRACY_RESTORE_TEST_DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Database diagnostic
        run: npm run database:diagnose

      - name: Prisma migration status
        run: npm run prisma:migrate:status

      - name: Prisma migration deploy
        if: ${{ inputs.run_prisma_deploy == 'true' }}
        run: npm run prisma:migrate:deploy

      - name: Identity migration dry-run
        run: npm run identity:migrate -- --dry-run

      - name: Refuse apply without explicit input
        if: ${{ inputs.apply_migration != 'true' }}
        run: |
          echo "Identity migration apply skipped because apply_migration was not exactly true."
          echo "This workflow is intentionally fail-closed for writes."

      - name: Identity migration apply
        if: ${{ inputs.apply_migration == 'true' }}
        run: npm run identity:migrate -- --apply

      - name: Cutover audit
        if: always()
        run: npm run identity:cutover-audit

      - name: Production trust audit
        if: always()
        run: npm run production:trust-audit

      - name: Upload non-sensitive audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: identity-durable-cutover-audits
          path: |
            data/generated/database-connectivity-audit.json
            data/generated/identity-migration-audit.json
            data/generated/identity-migration-apply-audit.json
            data/generated/identity-cutover-audit.json
            data/generated/production-trust-readiness.json
          if-no-files-found: ignore
