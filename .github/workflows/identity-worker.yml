name: Identity Worker

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum jobs to claim in this batch."
        required: true
        default: "10"
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: identity-worker
  cancel-in-progress: false

jobs:
  worker:
    name: Durable identity worker
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      actions: read
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      IDENTITY_MFA_ENCRYPTION_KEY: ${{ secrets.IDENTITY_MFA_ENCRYPTION_KEY }}
      IDENTITY_EVIDENCE_ENCRYPTION_KEY: ${{ secrets.IDENTITY_EVIDENCE_ENCRYPTION_KEY }}
      IDENTITY_EVIDENCE_STORAGE_BUCKET: ${{ vars.IDENTITY_EVIDENCE_STORAGE_BUCKET }}
      PLAYWRIGHT_SESSION_STORAGE_KEY: ${{ secrets.PLAYWRIGHT_SESSION_STORAGE_KEY }}
      PLAYWRIGHT_SESSION_STORAGE_BUCKET: ${{ vars.PLAYWRIGHT_SESSION_STORAGE_BUCKET }}
      DIRECT_DEMOCRACY_EMAIL_PROVIDER: ${{ secrets.DIRECT_DEMOCRACY_EMAIL_PROVIDER }}
      DIRECT_DEMOCRACY_EMAIL_FROM: ${{ secrets.DIRECT_DEMOCRACY_EMAIL_FROM }}
      DIRECT_DEMOCRACY_EMAIL_API_KEY: ${{ secrets.DIRECT_DEMOCRACY_EMAIL_API_KEY }}
      DIRECT_DEMOCRACY_EMAIL_TEST_RECIPIENT_ALLOWLIST: ${{ vars.DIRECT_DEMOCRACY_EMAIL_TEST_RECIPIENT_ALLOWLIST }}
      DIRECT_DEMOCRACY_WORKER_ENABLED: "true"
      DIRECT_DEMOCRACY_NETWORK_ENABLED: "true"
      DIRECT_DEMOCRACY_DATABASE_BACKUP_CONFIGURED: ${{ vars.DIRECT_DEMOCRACY_DATABASE_BACKUP_CONFIGURED }}
      DIRECT_DEMOCRACY_DATABASE_RESTORE_TESTED: ${{ vars.DIRECT_DEMOCRACY_DATABASE_RESTORE_TESTED }}
      DIRECT_DEMOCRACY_RESTORE_TEST_DATABASE_URL: ${{ secrets.DIRECT_DEMOCRACY_RESTORE_TEST_DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Database diagnostic
        run: npm run database:diagnose

      - name: Run bounded worker batch
        env:
          WORKER_LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.limit || '10' }}
        run: npm run worker:local -- --limit="$WORKER_LIMIT"

      - name: Worker smoke test
        run: npm run worker:smoke-test

      - name: Worker audit
        if: always()
        run: npm run worker:audit

      - name: Production trust audit
        if: always()
        run: npm run production:trust-audit

      - name: Upload non-sensitive worker audits
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: identity-worker-audits
          path: |
            data/generated/database-connectivity-audit.json
            data/generated/worker-queue-audit.json
            data/generated/worker-queue-audit.github-actions.json
            data/generated/production-trust-readiness.github-actions.json
            data/generated/audits/*/worker-queue-audit.json
            data/generated/audits/*/production-trust-readiness.json
          if-no-files-found: ignore
